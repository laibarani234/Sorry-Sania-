<!DOCTYPE html>
<html>
<head>
<title>Sorry Bestie 💖</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    overflow: hidden;
    background: linear-gradient(135deg,#ffe6f0,#ffd1dc);
}

/* LOGIN */
#login {
    position: absolute;
    width: 100%;
    height: 100%;
    background: linear-gradient(135deg,#ffdde1,#ee9ca7);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
}

input {
    padding: 10px;
    margin: 5px;
    border: none;
    border-radius: 10px;
}

/* MAIN */
#main {
    display: none;
    text-align: center;
    height: 100vh;
}

/* 💔 IMPORTANT SORRY TEXT */
h1 {
    color: #ff2e63;
    margin-top: 50px;
    font-size: 40px;
}

p {
    font-size: 18px;
    color: #333;
}

/* button */
#btn {
    position: absolute;
    padding: 15px 25px;
    border-radius: 30px;
    background: #ff2e63;
    color: white;
    cursor: pointer;
}

/* hearts */
.heart {
    position: absolute;
    animation: float 5s linear infinite;
}

@keyframes float {
    0% {transform: translateY(0);}
    100% {transform: translateY(-900px);}
}

/* stickers */
.sticker {
    position: absolute;
    font-size: 35px;
    animation: floatUp 7s linear infinite;
}

@keyframes floatUp {
    0% {transform: translateY(0);}
    100% {transform: translateY(-1000px);}
}

</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
    <h2>💌 Enter Love Zone</h2>
    <input placeholder="Name"><br>
    <input placeholder="Code"><br>
    <button onclick="enter()">Enter 💖</button>
</div>

<!-- MAIN -->
<div id="main">

    <!-- 💖 SORRY TEXT (IMPORTANT) -->
    <h1>I'm Really Sorry Bestie 🥺💖</h1>

    <p>
        Mujhse galti ho gayi 💔<br>
        Please mujhe maaf kar do 😭<br>
        Tumhare bina sab empty lagta hai 💞
    </p>

    <button id="btn" onmouseover="move()">Forgive Me 💕</button>
</div>

<script>

function enter(){
    document.getElementById("login").style.display="none";
    document.getElementById("main").style.display="block";
}

/* moving button */
function move(){
    let b = document.getElementById("btn");
    let x = Math.random()*(window.innerWidth-100);
    let y = Math.random()*(window.innerHeight-100);
    b.style.left = x+"px";
    b.style.top = y+"px";
}

/* hearts */
setInterval(()=>{
    let h = document.createElement("div");
    h.classList.add("heart");
    h.innerHTML = "💖";
    h.style.left = Math.random()*100+"vw";
    document.body.appendChild(h);
    setTimeout(()=>h.remove(),5000);
},400);

/* stickers */
let emojis = ["👧💖","🧸","🎀","🥺","💌","💞"];

setInterval(()=>{
    let s = document.createElement("div");
    s.classList.add("sticker");
    s.innerHTML = emojis[Math.floor(Math.random()*emojis.length)];
    s.style.left = Math.random()*100+"vw";
    s.style.top = "100vh";
    document.body.appendChild(s);

    setTimeout(()=>s.remove(),7000);
},600);

</script>

</body>
</html>
