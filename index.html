<!DOCTYPE html>
<html>
<head>
    <title>Sorry Bestie 💔</title>

    <style>
        body {
            text-align: center;
            font-family: Arial;
            background: linear-gradient(to right, #ffdde1, #ee9ca7);
            overflow: hidden;
        }

        h1 {
            margin-top: 100px;
            color: #ff4d6d;
        }

        p {
            font-size: 18px;
            margin: 20px;
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
            margin: 10px;
            border: none;
            border-radius: 20px;
            cursor: pointer;
        }

        #yesBtn {
            background-color: #ff4d6d;
            color: white;
        }

        #noBtn {
            background-color: gray;
            color: white;
            position: absolute;
        }

        .heart {
            position: absolute;
            color: red;
            animation: float 5s linear infinite;
        }

        @keyframes float {
            0% {transform: translateY(0);}
            100% {transform: translateY(-800px);}
        }
    </style>
</head>

<body>

    <h1>I'm Sorry Bestie 🥺💗</h1>

    <p>
        Mujhse galti ho gayi... 💔<br><br>
        Mera intention kabhi tumhe hurt karna nahi tha 😔<br><br>
        Please mujhse naraz mat raho...<br><br>
        I really miss you 😭
    </p>

    <button id="yesBtn" onclick="forgive()">Yes 🥺💖</button>
    <button id="noBtn" onmouseover="moveButton()">No 😒</button>

    <script>
        function forgive() {
            alert("Yayyy! Bestie ne maaf kar diya 🥰💖");
        }

        function moveButton() {
            let x = Math.random() * window.innerWidth;
            let y = Math.random() * window.innerHeight;
            document.getElementById("noBtn").style.left = x + "px";
            document.getElementById("noBtn").style.top = y + "px";
        }

        // Hearts animation
        setInterval(() => {
            let heart = document.createElement("div");
            heart.classList.add("heart");
            heart.innerHTML = "💖";
            heart.style.left = Math.random() * 100 + "vw";
            heart.style.fontSize = Math.random() * 20 + 20 + "px";
            document.body.appendChild(heart);

            setTimeout(() => {
                heart.remove();
            }, 5000);
        }, 500);
    </script>

</body>
</html>
