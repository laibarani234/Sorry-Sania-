<!DOCTYPE html>
<html>
<head>
    <title>Sorry Bestie 💔</title>

    <style>
        body {
            text-align: center;
            font-family: Arial;
            background: linear-gradient(to right, #ffdde1, #ee9ca7);
            overflow: hidden;
        }

        h1 {
            color: #ff4d6d;
            margin-top: 100px;
            animation: fadeIn 2s;
        }

        p {
            font-size: 18px;
            color: #333;
            margin: 20px;
            animation: fadeIn 3s;
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
            background-color: #ff4d6d;
            color: white;
            border: none;
            border-radius: 20px;
            cursor: pointer;
        }

        button:hover {
            background-color: #ff1a4d;
        }

        .heart {
            position: absolute;
            color: red;
            animation: float 5s infinite;
        }

        @keyframes float {
            0% {transform: translateY(0);}
            100% {transform: translateY(-800px);}
        }

        @keyframes fadeIn {
            from {opacity: 0;}
            to {opacity: 1;}
        }
    </style>
</head>

<body>

    <h1>I'm Really Sorry Bestie 🥺💗</h1>

    <p>
        Mujhse galti ho gayi... 💔<br><br>
        Mera intention kabhi tumhe hurt karna nahi tha 😔<br><br>
        Tum meri life ka sabse important part ho 💖<br><br>
        Please mujhse naraz mat raho... 😭<br><br>
        I really miss you 🫶
    </p>

    <button onclick="showMessage()">Forgive Me? 🥺</button>

    <script>
        function showMessage() {
            alert("Yayyy! Bestie ne maaf kar diya 💖🥰");
        }

        // Floating hearts
        setInterval(() => {
            let heart = document.createElement("div");
            heart.classList.add("heart");
            heart.innerHTML = "💖";
            heart.style.left = Math.random() * 100 + "vw";
            heart.style.fontSize = Math.random() * 20 + 20 + "px";
            document.body.appendChild(heart);

            setTimeout(() => {
                heart.remove();
            }, 5000);
        }, 500);
    </script>

</body>
</html>
